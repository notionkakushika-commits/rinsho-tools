<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心電図ツール（準備中）｜臨床ツールズ</title>
<style>
 :root{--bg:#eef1f4;--card:#fff;--ink:#1f2a33;--sub:#5b6b78;--line:#e2e8ee;--accent:#0f8a9c;--accent-d:#0b6b78;--accent-bg:#e8f5f7}
 *{box-sizing:border-box}
 body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
  line-height:1.7;display:flex;justify-content:center;padding:24px 16px}
 .wrap{width:100%;max-width:480px;text-align:center;padding-top:40px}
 .ico{width:64px;height:64px;border-radius:16px;background:var(--accent-bg);color:var(--accent-d);
  display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:800;margin:0 auto 18px}
 h1{font-size:22px;margin:0 0 6px}
 p{color:var(--sub);font-size:14.5px;margin:0 0 24px}
 a.back{display:inline-block;text-decoration:none;background:var(--ink);color:#fff;
  border-radius:12px;padding:13px 22px;font-weight:700;font-size:15px}
 .note{margin-top:30px;font-size:12.5px;color:var(--sub);background:var(--card);border:1px solid var(--line);
  border-radius:12px;padding:14px 16px;text-align:left;line-height:1.7}
 .note b{color:var(--ink)}
</style>
</head>
<body>
<div class="wrap">
 <div class="ico">心</div>
 <h1>心電図ツール（準備中）</h1>
 <p>このページは枠だけ用意してあります。心電図アプリができたら、ここに入れ替えてください。</p>
 <a class="back" href="../">← メニューに戻る</a>
 <div class="note"><b>差し替え方法：</b>このフォルダ（ecg）の <b>index.html</b> を、心電図アプリのHTMLで上書きアップロードするだけ。URL（…/ecg/）は変わりません。</div>
</div>
</body>
</html>
